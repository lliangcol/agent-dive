name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate:
    name: Validate AgentDive content (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest and coverage
        run: pip install pytest pytest-cov

      - name: Run unit tests with coverage
        run: python -m pytest tests/ -v --cov=scripts --cov=examples --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=100

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

      - name: Run repository checks
        run: python scripts/check-agent-dive.py

      - name: Compile scripts
        run: python -m compileall scripts

      - name: Smoke-test runnable examples
        run: |
          python examples/minimal-agent/agent.py "What is 3 + 4?"
          python examples/tool-calling-demo/demo.py
          python examples/tool-calling-demo/parallel_demo.py
          python examples/rag-agent-demo/rag.py "What is an AI agent?"
          python examples/mcp-demo/mcp_demo.py
